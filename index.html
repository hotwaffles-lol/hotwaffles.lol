<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="hot waffles lol" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Futura, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #ffe55c;
        background-image: repeating-linear-gradient(
            0deg,
            rgba(180, 100, 0, 0.045) 0,
            rgba(180, 100, 0, 0.045) 1px,
            transparent 1px,
            transparent 64px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(180, 100, 0, 0.045) 0,
            rgba(180, 100, 0, 0.045) 1px,
            transparent 1px,
            transparent 64px
          ),
          linear-gradient(160deg, #fffde8 0%, #fff3c0 45%, #ffe55c 100%);
      }
      body.deluxe {
        background-color: #3b0764;
        background-image: repeating-linear-gradient(
            0deg,
            rgba(200, 100, 255, 0.06) 0,
            rgba(200, 100, 255, 0.06) 1px,
            transparent 1px,
            transparent 64px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(200, 100, 255, 0.06) 0,
            rgba(200, 100, 255, 0.06) 1px,
            transparent 1px,
            transparent 64px
          ),
          linear-gradient(160deg, #1e0540 0%, #4c1d95 50%, #6d28d9 100%);
      }

      /* ── background waffles ── */
      .bg-waffles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .flyer {
        position: absolute;
        opacity: 0.28;
        line-height: 1;
      }

      .waffle-body {
        display: block;
        animation: tilt var(--tilt) ease-in-out infinite;
      }

      @keyframes tilt {
        0%,
        100% {
          transform: rotate(-5deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }

      /* ── main content ── */
      main {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
      }

      .hero-waffle {
        display: block;
        font-size: clamp(5rem, 20vw, 8.5rem);
        line-height: 1;
        margin-bottom: 1.2rem;
        filter: drop-shadow(4px 6px 0 rgba(150, 80, 0, 0.18));
        animation: waffle-bob 3s ease-in-out infinite;
        cursor: default;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
          filter 0.8s ease;
        user-select: none;
      }
      .hero-waffle:hover {
        transform: scale(1.15) rotate(10deg);
      }
      body.deluxe .hero-waffle {
        filter: drop-shadow(4px 6px 0 rgba(120, 0, 255, 0.4));
      }

      @keyframes waffle-bob {
        0%,
        100% {
          transform: translateY(0px) rotate(-3deg);
        }
        50% {
          transform: translateY(-16px) rotate(3deg);
        }
      }

      h1 {
        color: #c04800;
        width: fit-content;
        margin-inline: auto;
        transition: color 0.6s ease;
      }
      h1 svg {
        fill: currentColor;
        width: min(30rem, 100%);
        color: #c04800;
      }
      body.deluxe h1 {
        color: #ede9fe;
      }
      body.deluxe h1 svg {
        color: #ede9fe;
      }

      .deluxe-btn {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 2;
        padding: 0.55rem 1.3rem;
        border: 2px solid rgba(150, 75, 0, 0.28);
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: rgba(120, 60, 0, 0.7);
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(150, 75, 0, 0.12);
        transition: color 0.25s, border-color 0.25s, background 0.25s,
          transform 0.2s, box-shadow 0.25s;
        user-select: none;
      }
      .deluxe-btn:hover {
        border-color: rgba(150, 75, 0, 0.55);
        color: rgba(100, 45, 0, 1);
        background: rgba(255, 255, 255, 0.75);
        transform: scale(1.05);
        box-shadow: 0 4px 20px rgba(150, 75, 0, 0.2);
      }
      body.deluxe .deluxe-btn {
        border-color: rgba(167, 139, 250, 0.45);
        color: rgba(210, 195, 255, 0.9);
        background: rgba(50, 15, 90, 0.55);
        box-shadow: 0 2px 12px rgba(109, 40, 217, 0.3);
      }
      body.deluxe .deluxe-btn:hover {
        border-color: rgba(167, 139, 250, 0.85);
        color: rgba(237, 233, 254, 1);
        background: rgba(80, 30, 140, 0.75);
        box-shadow: 0 4px 20px rgba(109, 40, 217, 0.5);
      }
    </style>

    <script>
      // ── constants ──
      const PAD = 160;          // px beyond viewport edge before a waffle is considered "off screen"
      const DESCENT = 0.45;     // how far down the screen (as a fraction of vh) each waffle drifts as it crosses
      const UNDULATE = 14;      // amplitude in px of the vertical sine wave added to each waffle's path
      const NORMAL_COUNT = 22;  // background waffles always present
      const EXTRA_COUNT = 22;   // additional waffles that only appear in deluxe mode
      const NORMAL_OP = 0.28;   // background waffle opacity in normal mode
      const DELUXE_OP = 0.55;   // background waffle opacity in deluxe mode

      // persist deluxe preference across visits
      let isDeluxe = localStorage.getItem("deluxe") === "1";

      // ── create waffle elements ──
      const container = document.querySelector(".bg-waffles");
      const waffles = [];

      // Creates one background waffle DOM element and returns a state object
      // for it. `extra` waffles are slightly larger and faster, and are only
      // shown in deluxe mode.
      function makeWaffle(extra) {
        const el = document.createElement("div");
        el.className = "flyer";
        const em = document.createElement("span");
        em.className = "waffle-body";
        em.textContent = "🧇";
        // randomise the CSS tilt animation duration so waffles rock at different rates
        em.style.setProperty(
          "--tilt",
          (2 + Math.random() * 2).toFixed(2) + "s"
        );
        el.appendChild(em);
        container.appendChild(el);

        // random font-size gives each waffle a unique apparent size/depth
        const size = ((extra ? 1.8 : 1.4) + Math.random() * 2.0).toFixed(2);
        // park off-screen until the animation loop places them properly
        el.style.cssText = `font-size:${size}em; left:-9999px; top:-9999px;`;

        return {
          el,
          extra,
          top: -0.15 + Math.random() * 0.85,    // starting vertical position as a fraction of vh (slight overshoot above/below)
          speed: (extra ? 7 : 9) + Math.random() * (extra ? 11 : 14), // seconds to cross the full screen
          prog: Math.random(),                   // 0–1 progress along the flight path (randomised so they don't all start at the right edge)
          undulateSpeed: 1.5 + Math.random() * 2.5,  // frequency of the sine wave bobbing
          undulatePhase: Math.random() * Math.PI * 2, // phase offset so waffles are out of sync
          chaseSpeed: 0.03 + Math.random() * 0.1,    // lerp factor when homing toward the cursor (lower = lazier)
          baseR: 40 + Math.random() * 90,            // orbit radius around cursor while chasing
          angle: Math.random() * Math.PI * 2,        // fixed angle in that orbit so waffles spread out
          bobSpeed: 1.0 + Math.random() * 2.5,       // how fast the orbit radius pulses while chasing
          bobPhase: Math.random() * Math.PI * 2,     // phase offset for the orbit pulse
          // state machine: 'flying' | 'chasing' | 'returning'
          state: "flying",
          cx: 0, cy: 0,  // current centre position in px
          w: 0, h: 0,    // measured element dimensions (set after first render frame)
          // snapshot of where the waffle was when it left its flight path to chase
          frozenProg: 0, frozenTop: 0, frozenTime: 0,
        };
      }

      for (let n = 0; n < NORMAL_COUNT; n++) waffles.push(makeWaffle(false));
      for (let n = 0; n < EXTRA_COUNT; n++) waffles.push(makeWaffle(true));

      // Let the browser render one frame so the elements have real dimensions,
      // then measure each waffle and kick off the animation loop.
      requestAnimationFrame(() => {
        for (const w of waffles) {
          const r = w.el.getBoundingClientRect();
          w.w = r.width || 48;
          w.h = r.height || 48;
        }
        requestAnimationFrame(tick);
      });

      // ── cursor tracking ──
      // Smoothed cursor velocity is used to shrink waffle orbits when the
      // mouse is moving fast (so they don't scatter wildly).
      let cursor = { x: innerWidth / 2, y: innerHeight / 2 };
      let smoothVel = 0,
        lastCx = cursor.x,
        lastCy = cursor.y;
      document.addEventListener("mousemove", (e) => {
        cursor.x = e.clientX;
        cursor.y = e.clientY;
      });

      // ── path math ──
      // Returns the ideal {cx, cy} for a waffle on its flight path at a given
      // moment. prog=0 → just off the right edge; prog=1 → just off the left edge.
      // A sine wave is added to cy so the path undulates vertically over time.
      function flyPos(top, prog, t, w) {
        const vw = innerWidth,
          vh = innerHeight;
        return {
          cx: vw + PAD - prog * (vw + 2 * PAD),
          cy:
            top * vh +
            prog * (DESCENT * vh) +
            Math.sin(t * w.undulateSpeed + w.undulatePhase) * UNDULATE,
        };
      }

      // ── main loop ──
      let prevTs = 0;

      function tick(ts) {
        // dt is elapsed seconds since last frame, capped to avoid huge jumps after
        // the tab is backgrounded and then foregrounded.
        const dt = prevTs ? Math.min((ts - prevTs) / 1000, 0.05) : 0;
        prevTs = ts;
        const t = ts / 1000;   // absolute time in seconds (used for sine calculations)
        const vw = innerWidth;

        // compute a smoothed cursor speed (exponential moving average)
        const dvx = cursor.x - lastCx,
          dvy = cursor.y - lastCy;
        smoothVel = smoothVel * 0.85 + Math.sqrt(dvx * dvx + dvy * dvy) * 0.15;
        lastCx = cursor.x;
        lastCy = cursor.y;
        // velScale → 1 when mouse is still, approaches 0 when mouse moves fast
        const velScale = 1 - Math.min(smoothVel / 18, 0.85);

        for (const w of waffles) {
          // hide extra waffles entirely when not in deluxe mode
          if (w.extra && !isDeluxe) {
            w.el.style.left = "-9999px";
            continue;
          }

          const targetOp = isDeluxe ? DELUXE_OP : NORMAL_OP;

          if (w.state === "flying") {
            // advance along the path based on elapsed time and the waffle's speed
            w.prog += dt / w.speed;
            const p = flyPos(w.top, w.prog, t, w);
            w.cx = p.cx;
            w.cy = p.cy;
            // once fully off the left edge, reset to the right and pick a new vertical lane
            if (w.cx + w.w / 2 < 0) {
              w.prog = 0;
              w.top = -0.15 + Math.random() * 0.85;
            }

          } else if (w.state === "chasing") {
            // orbit radius pulses over time and collapses when the cursor moves fast
            const r =
              w.baseR *
              velScale *
              (0.4 + 0.6 * Math.sin(t * w.bobSpeed + w.bobPhase));
            // target point is a fixed angle around the cursor at radius r
            const tx = cursor.x + r * Math.cos(w.angle);
            const ty = cursor.y + r * Math.sin(w.angle);
            // lerp toward target — lower chaseSpeed means a lazier, floatier follow
            w.cx += (tx - w.cx) * w.chaseSpeed;
            w.cy += (ty - w.cy) * w.chaseSpeed;

          } else if (w.state === "returning") {
            // fade back to the normal background opacity
            const op = parseFloat(w.el.style.opacity) || 1;
            if (op > targetOp)
              w.el.style.opacity = Math.max(targetOp, op - 0.015).toFixed(3);

            // compute where the waffle *would* be if it had kept flying the whole time
            // (rawGp is intentionally NOT modded by 1 — we want to detect loop completion)
            const elapsed = (ts - w.frozenTime) / 1000;
            const rawGp = w.frozenProg + elapsed / w.speed;

            if (rawGp >= 1) {
              // the ghost path has completed a full loop; rather than jumping to prog=0
              // (which would shoot the waffle to the right edge), compute prog from the
              // waffle's current x position so it re-joins the path smoothly in place.
              const resumeProg = (vw + PAD - w.cx) / (vw + 2 * PAD);
              w.prog = Math.max(0, Math.min(0.999, resumeProg));
              w.top = w.frozenTop;
              w.state = "flying";
              w.el.style.opacity = String(targetOp);
            } else {
              // lerp toward the ghost position so the waffle drifts back to its path
              const ghost = flyPos(w.frozenTop, rawGp, t, w);
              w.cx += (ghost.cx - w.cx) * 0.05;
              w.cy += (ghost.cy - w.cy) * 0.05;
              // snap to flying state once close enough to avoid endless asymptotic approach
              if (Math.hypot(ghost.cx - w.cx, ghost.cy - w.cy) < 8) {
                w.prog = rawGp;
                w.top = w.frozenTop;
                w.state = "flying";
                w.el.style.opacity = String(targetOp);
              }
            }
          }

          // only write position styles when the waffle is near the visible area;
          // otherwise park it at -9999px to keep it out of the render tree
          if (
            w.state !== "flying" ||
            (w.cx + w.w / 2 > -80 && w.cx - w.w / 2 < vw + 80)
          ) {
            w.el.style.left = w.cx - w.w / 2 + "px";
            w.el.style.top = w.cy - w.h / 2 + "px";
          } else {
            w.el.style.left = "-9999px";
          }
        }

        requestAnimationFrame(tick);
      }

      // ── swarm control ──
      // Hovering the hero waffle triggers a swarm: all background waffles switch
      // to 'chasing' and orbit the cursor. After the mouse leaves and 3 seconds
      // pass, they drift back to their original flight paths.
      let returnTimer = null;

      function startChase() {
        clearTimeout(returnTimer);
        // raise the waffle container above main content so waffles render on top
        container.style.zIndex = "10";
        const now = performance.now();
        for (const w of waffles) {
          if (w.extra && !isDeluxe) continue;
          // snapshot the current path position so we can resume from here on return
          if (w.state === "flying") {
            w.frozenProg = w.prog;
            w.frozenTop = w.top;
            w.frozenTime = now;
          }
          w.state = "chasing";
          w.el.style.opacity = "1";  // fully opaque while swarming
        }
      }

      function beginReturn() {
        clearTimeout(returnTimer);
        // delay the return so waffles don't immediately scatter the moment the
        // mouse leaves — gives the effect a bit of stickiness
        returnTimer = setTimeout(() => {
          container.style.zIndex = "";
          for (const w of waffles) {
            if (w.state === "chasing") w.state = "returning";
          }
        }, 3000);
      }

      const heroWaffle = document.querySelector(".hero-waffle");
      heroWaffle.addEventListener("mouseenter", startChase);
      heroWaffle.addEventListener("mouseleave", beginReturn);

      // ── deluxe mode ──
      const btn = document.querySelector(".deluxe-btn");
      const h1 = document.querySelector("h1");

      // Applies the current isDeluxe state to the DOM: swaps colours, button
      // label, page title, waffle count/opacity, and the SVG drop-shadow filter.
      function applyDeluxe() {
        document.body.classList.toggle("deluxe", isDeluxe);
        btn.textContent = isDeluxe ? "☀️ go normal" : "✨ go deluxe";
        document.title = isDeluxe ? "hotwaffles.lol ✨" : "hotwaffles.lol";
        document.getElementById("svg-title").textContent = isDeluxe ? "Hot Waffles Deluxe" : "Hot Waffles";
        const targetOp = isDeluxe ? DELUXE_OP : NORMAL_OP;
        for (const w of waffles) {
          // activate extra waffles when entering deluxe; scatter them at random positions
          if (w.extra && isDeluxe) {
            w.prog = Math.random();
            w.top = -0.15 + Math.random() * 0.85;
            w.state = "flying";
          }
          if (w.state === "flying") {
            w.el.style.opacity = String(targetOp);
          }
        }
        // swap the SVG title drop-shadow between warm (normal) and purple (deluxe)
        document
          .querySelector("use[filter]")
          .setAttribute(
            "filter",
            isDeluxe ? "url(#filter-deluxe)" : "url(#filter-normal)"
          );
      }

      function toggleDeluxe() {
        isDeluxe = !isDeluxe;
        localStorage.setItem("deluxe", isDeluxe ? "1" : "0");
        applyDeluxe();
      }

      // restore saved deluxe state on page load
      if (isDeluxe) applyDeluxe();

      // ── tab title easter egg ──
      // Cycles through fun messages in the tab title when the user switches away,
      // then restores the real title when they come back.
      const away = [
        "🧇 getting cold…",
        "🔥 still hot!",
        "🧇 come back!",
        "⏳ waffles waiting…",
      ];
      let i = 0;
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          document.title = isDeluxe ? "hotwaffles.lol ✨" : "hotwaffles.lol";
        } else {
          document.title = away[i++ % away.length];
        }
      });
    </script>
  </body>
</html>
